version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crawler-net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - screenshots_data:/tmp/screenshots
    networks:
      - crawler-net

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - screenshots_data:/tmp/screenshots
    networks:
      - crawler-net

volumes:
  redis_data:
  screenshots_data:

networks:
  crawler-net:
    driver: bridge
